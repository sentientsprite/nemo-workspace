<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEMO Orchestrator | Task Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --success: #3fb950;
    --warning: #d29922;
    --danger: #f85149;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.2em;
    font-weight: 600;
    text-decoration: none;
    color: var(--text);
  }
  
  .nav-tabs {
    display: flex;
    gap: 4px;
  }
  
  .nav-tab {
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    color: var(--text-muted);
    font-size: 0.9em;
    font-weight: 500;
    transition: all 0.2s;
  }
  
  .nav-tab:hover, .nav-tab.active {
    color: var(--text);
    background: var(--bg-tertiary);
  }
  
  .nav-tab.active {
    border: 1px solid var(--border);
  }
  
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }
  
  .filter-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  
  .filter-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 0.9em;
    color: var(--text-muted);
  }
  
  .filter-toggle input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }
  
  .command-bar {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  
  .cmd-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'SF Mono', monospace;
    font-size: 0.9em;
  }
  
  .btn {
    padding: 10px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text);
    font-size: 0.9em;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #79b8ff; }
  
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  
  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
  
  .stat-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  
  .stat-label {
    font-size: 0.85em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  
  .stat-value {
    font-size: 2em;
    font-weight: 700;
  }
  
  .panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .panel-title {
    font-size: 1em;
    font-weight: 600;
  }
  
  table {
    width: 100%;
    border-collapse: collapse;
  }
  
  th {
    text-align: left;
    padding: 12px 20px;
    font-size: 0.75em;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
  }
  
  td {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 0.9em;
  }
  
  tr:hover { background: var(--bg-tertiary); }
  
  .agent-cell {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .agent-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2em;
    border: 2px solid var(--border);
  }
  
  .agent-avatar.active { border-color: var(--success); }
  .agent-avatar.idle { border-color: var(--warning); }
  
  .agent-name { font-weight: 600; }
  .agent-role { font-size: 0.8em; color: var(--text-muted); }
  
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.8em;
    font-weight: 500;
  }
  
  .status-badge.active { background: rgba(63, 185, 80, 0.15); color: var(--success); }
  .status-badge.idle { background: rgba(210, 153, 34, 0.15); color: var(--warning); }
  
  .project-link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  
  .project-link:hover {
    text-decoration: underline;
  }
  
  .task-text {
    color: var(--text-muted);
    font-size: 0.85em;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  .action-btn {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 0.8em;
    cursor: pointer;
  }
  
  .action-btn:hover {
    background: var(--bg-tertiary);
    color: var(--text);
  }
  
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 16px;
    padding: 20px;
  }
  
  .project-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: all 0.2s;
  }
  
  .project-card:hover {
    border-color: var(--accent);
  }
  
  .project-card.inProgress {
    border-left: 3px solid var(--accent);
  }
  
  .project-card.done {
    border-left: 3px solid var(--success);
    opacity: 0.7;
  }
  
  .project-card.blocked {
    border-left: 3px solid var(--danger);
  }
  
  .project-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  
  .project-name {
    font-weight: 600;
  }
  
  .project-status {
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75em;
    text-transform: uppercase;
  }
  
  .project-agents {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  
  .project-agent {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    background: var(--bg-tertiary);
    border-radius: 12px;
    font-size: 0.8em;
    text-decoration: none;
    color: var(--text);
  }
  
  .project-agent:hover {
    background: var(--border);
  }
  
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 12px;
  }
  
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
  }
</style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="brand">
      <span>🐟</span>
      <span>NEMO Orchestrator</span>
    </a>
    <nav class="nav-tabs">
      <a href="index.html" class="nav-tab active">📊 Sessions</a>
      <a href="office.html" class="nav-tab">🏢 Office</a>
      <a href="trading.html" class="nav-tab">📈 Trading</a>
    </nav>
  </header>

  <div class="container">
    <div class="command-bar">
      <span style="color: var(--text-muted); font-family: monospace;">$</span>
      <input type="text" class="cmd-input" placeholder="spawn researcher --task='Analyze markets' --project='Kalshi API'" id="cmdInput">
      <button class="btn btn-primary" onclick="executeCommand()">▶ Run</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Active Agents</div>
        <div class="stat-value" style="color: var(--success);" id="activeCount">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">In Progress Projects</div>
        <div class="stat-value" style="color: var(--accent);" id="projectCount">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tasks Completed</div>
        <div class="stat-value" id="taskCount">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Monthly Cost</div>
        <div class="stat-value" style="color: var(--success);">$7.50</div>
      </div>
    </div>

    <!-- Projects Panel (First) -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📋 Projects</span>
        <span class="section-meta" id="projectMeta">Loading...</span>
      </div>
      <div class="progress-bar" style="margin: 16px 20px;">
        <div class="progress-fill" id="projectProgress" style="width: 0%"></div>
      </div>
      <div style="padding: 0 20px 16px; display: flex; justify-content: space-between; align-items: center;">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9em; color: var(--text-muted);">
          <input type="checkbox" id="hideCompleted" onchange="toggleCompleted()" style="width: 16px; height: 16px;">
          Hide completed projects
        </label>
        <span style="font-size: 0.85em; color: var(--text-muted);" id="visibleCount">- projects</span>
      </div>
      <div class="project-grid" id="projectGrid">
        <div style="padding: 40px; text-align: center; color: var(--text-muted);">Loading projects...</div>
      </div>
    </div>

    <!-- Agent Sessions Panel (Second) -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🤖 Agent Sessions</span>
        <button class="btn" onclick="refreshData()">↻ Refresh</button>
      </div>
      <table id="agentTable">
        <thead>
          <tr>
            <th>Agent</th>
            <th>Status</th>
            <th>Current Task</th>
            <th>Project</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="agentTableBody">
          <tr><td colspan="5" style="text-align: center; padding: 40px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Map agents to projects based on their currentTask
    function getAgentProject(agent, projects) {
      const task = agent.currentTask?.toLowerCase() || '';
      
      if (task.includes('kalshi')) return 'Kalshi API Skill';
      if (task.includes('snipe') || task.includes('trading') || task.includes('test')) return 'Trading Bot Development';
      if (task.includes('documentation') || task.includes('file audit')) return 'Documentation & Tracking';
      if (task.includes('security') || task.includes('audit')) return 'Security Hardening';
      if (task.includes('health check') || task.includes('24/7') || task.includes('operations')) return '24/7 Operations';
      if (task.includes('spryte') || task.includes('integration')) return 'Spryte Engine Fork';
      if (task.includes('social') || task.includes('media')) return 'Social Media Presence';
      if (task.includes('token') || task.includes('efficiency')) return 'Token Efficiency System';
      if (task.includes('market intelligence') || task.includes('research')) return 'Polymarket Intelligence';
      
      return 'General';
    }
    
    // Get project status
    function getProjectStatus(name, projects) {
      const project = projects.find(p => p.name === name);
      return project?.status || 'unknown';
    }
    
    async function loadData() {
      try {
        const res = await fetch('data.json?' + Date.now());
        const data = await res.json();
        
        const agents = data.office?.agents || [];
        const projects = data.projects || [];
        
        // Update stats
        const active = agents.filter(a => a.status === 'active').length;
        const inProgress = projects.filter(p => p.status === 'inProgress').length;
        const totalTasks = agents.reduce((sum, a) => sum + (a.tasksCompleted || 0), 0);
        
        document.getElementById('activeCount').textContent = active;
        document.getElementById('projectCount').textContent = inProgress;
        document.getElementById('taskCount').textContent = totalTasks;
        
        // Build agent table with project links
        const tbody = document.getElementById('agentTableBody');
        tbody.innerHTML = agents.map(agent => {
          const projectName = getAgentProject(agent, projects);
          const projectStatus = getProjectStatus(projectName, projects);
          
          return `
            <tr>
              <td>
                <div class="agent-cell">
                  <div class="agent-avatar ${agent.status}">${agent.emoji}</div>
                  <div>
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-role">${agent.role}</div>
                  </div>
                </div>
              </td>
              <td>
                <span class="status-badge ${agent.status}">
                  ${agent.status === 'active' ? '●' : '◐'} ${agent.status}
                </span>
              </td>
              <td class="task-text" title="${agent.currentTask}">${agent.currentTask}</td>
              <td>
                <a href="#project-${projectName.replace(/\\s+/g, '-').toLowerCase()}" class="project-link">
                  ${projectName}
                </a>
              </td>
              <td>
                <button class="action-btn" onclick="viewAgent('${agent.id}')">View</button>
                <button class="action-btn" onclick="sendAgent('${agent.id}')">Send</button>
              </td>
            </tr>
          `;
        }).join('');
        
        // Build project cards with assigned agents
        const projectAgents = {};
        agents.forEach(agent => {
          const project = getAgentProject(agent, projects);
          if (!projectAgents[project]) projectAgents[project] = [];
          projectAgents[project].push(agent);
        });
        
        // Store projects for toggle filter
        window.allProjects = projects;
        window.projectAgents = projectAgents;
        renderProjects();
        
      } catch (err) {
        console.error('Failed to load data:', err);
        document.getElementById('agentTableBody').innerHTML = `
          <tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--danger);">
            Error loading data. Check console.
          </td></tr>
        `;
      }
    }
    
    function executeCommand() {
      const cmd = document.getElementById('cmdInput').value;
      if (!cmd) return;
      alert(`Command: ${cmd}\\n\\n(In full implementation, this would spawn a new agent session)`);
      document.getElementById('cmdInput').value = '';
    }
    
    function viewAgent(id) {
      window.location.href = `office.html?agent=${id}`;
    }
    
    function sendAgent(id) {
      const msg = prompt(`Send command to ${id}:`);
      if (msg) alert(`Sent to ${id}: ${msg}`);
    }
    
    function focusAgent(id) {
      // Scroll to agent in table and highlight
      const rows = document.querySelectorAll('#agentTableBody tr');
      rows.forEach(row => {
        if (row.innerHTML.includes(`viewAgent('${id}')`)) {
          row.style.background = 'rgba(88, 166, 255, 0.2)';
          row.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(() => row.style.background = '', 2000);
        }
      });
    }
    
    function refreshData() {
      loadData();
    }
    
    let hideCompleted = false;
    
    function toggleCompleted() {
      hideCompleted = document.getElementById('hideCompleted').checked;
      renderProjects();
    }
    
    function renderProjects() {
      const projects = window.allProjects || [];
      const projectAgents = window.projectAgents || {};
      
      const filtered = hideCompleted 
        ? projects.filter(p => p.status !== 'done')
        : projects;
      
      document.getElementById('visibleCount').textContent = `${filtered.length} project${filtered.length !== 1 ? 's' : ''}`;
      
      const total = projects.length;
      const done = projects.filter(p => p.status === 'done').length;
      const pct = total > 0 ? (done / total * 100) : 0;
      
      document.getElementById('projectMeta').textContent = `${done}/${total} complete (${Math.round(pct)}%)`;
      document.getElementById('projectProgress').style.width = pct + '%';
      
      const grid = document.getElementById('projectGrid');
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">No projects to show</div>';
        return;
      }
      
      grid.innerHTML = filtered.map(project => {
        const assigned = projectAgents[project.name] || [];
        const totalTasks = project.tasks.length;
        const doneTasks = project.tasks.filter(t => t.status === 'done').length;
        const pctTasks = totalTasks > 0 ? (doneTasks / totalTasks * 100) : 0;
        
        return `
          <div class="project-card ${project.status}" id="project-${project.name.replace(/\\s+/g, '-').toLowerCase()}">
            <div class="project-header">
              <span class="project-name">${project.name}</span>
              <span class="project-status" style="
                background: ${project.status === 'done' ? 'rgba(63,185,80,0.2)' : project.status === 'inProgress' ? 'rgba(88,166,255,0.2)' : 'rgba(210,153,34,0.2)'}
                color: ${project.status === 'done' ? 'var(--success)' : project.status === 'inProgress' ? 'var(--accent)' : 'var(--warning)'}
              ">${project.status}</span>
            </div>
            
            ${assigned.length > 0 ? `
              <div style="margin-bottom: 12px;">
                <div style="font-size: 0.8em; color: var(--text-muted); margin-bottom: 6px;">Assigned Agents:</div>
                <div class="project-agents">
                  ${assigned.map(a => `
                    <a href="#agent-${a.id}" class="project-agent" onclick="focusAgent('${a.id}')">
                      ${a.emoji} ${a.name}
                    </a>
                  `).join('')}
                </div>
              </div>
            ` : '<div style="font-size: 0.8em; color: var(--text-muted); margin-bottom: 12px;">No active agents</div>'}
            
            <div style="font-size: 0.85em; color: var(--text-muted);">
              ${doneTasks}/${totalTasks} tasks complete
            </div>
            
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${pctTasks}%; background: ${pctTasks === 100 ? 'var(--success)' : 'var(--accent)'}"></div>
            </div>
            
            ${project.note ? `<div style="margin-top: 12px; font-size: 0.8em; color: var(--text-muted);">${project.note}</div>` : ''}
          </div>
        `;
      }).join('');
    }
    
    document.getElementById('cmdInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') executeCommand();
    });
    
    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
